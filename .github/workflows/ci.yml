name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run final project tests
        run: pytest 10_final_project/tests/ -v

      - name: Verify example scripts run
        run: |
          python 01_variables/examples/01_first_variables.py
          python 01_variables/examples/02_insurance_client.py
          python 05_loops/examples/01_for_basics.py
          python 06_functions/examples/02_premium_calculator.py
